<h2>Bibliotecas</h2>

<form #form="ngForm" (ngSubmit)="crear(form)">
  <input [(ngModel)]="nueva.nombre" name="nombre" placeholder="Nombre" required>
  <input [(ngModel)]="nueva.direccion" name="direccion" placeholder="Dirección" required>
  <input [(ngModel)]="nueva.telefono" name="telefono" placeholder="Teléfono" required>
  <input [(ngModel)]="nueva.responsable" name="responsable" placeholder="Responsable" required>
  <button type="submit" [disabled]="form.invalid">Agregar</button>
</form>

<table>
  <thead>
    <tr>
      <th>ID</th><th>Nombre</th><th>Dirección</th><th>Teléfono</th><th>Responsable</th><th></th>
    </tr>
  </thead>
  <tbody>
    @for (b of bibliotecas; track b.id) {
      <tr>
        <td>{{ b.id }}</td>
        <td>{{ b.nombre }}</td>
        <td>{{ b.direccion }}</td>
        <td>{{ b.telefono }}</td>
        <td>{{ b.responsable }}</td>
        <td><button (click)="eliminar(b.id!)">Eliminar</button></td>
      </tr>
    }
  </tbody>
</table>
